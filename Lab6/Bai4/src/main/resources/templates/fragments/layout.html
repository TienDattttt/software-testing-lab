<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title}">App</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body th:fragment="body(content)">
<nav class="navbar navbar-expand-lg bg-light border-bottom">
  <div class="container">
    <a class="navbar-brand fw-semibold" th:href="@{/org-unit/list}">Organization</a>
    <div class="ms-auto">
      <a class="btn btn-outline-secondary btn-sm" th:href="@{/org-unit/list}">List</a>
      <a class="btn btn-success btn-sm ms-2" th:href="@{/org-unit/add}">Add</a>
    </div>
  </div>
</nav>

<main class="container py-4" th:insert="${content}"></main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
