<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Organization Units')"></head>
<body th:replace="fragments/layout :: body(~{::content})">

<content>
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
    <h4 class="mb-0">Organization Units</h4>
    <a class="btn btn-success" th:href="@{/org-unit/add}">+ Add Organization Unit</a>
  </div>

  <!-- Search -->
  <form class="row g-2 mb-3" method="get" th:action="@{/org-unit/list}">
    <div class="col-sm-8 col-md-6">
      <input type="text" class="form-control" name="q" th:value="${q}"
             placeholder="Search by Name or Unit Id...">
    </div>
    <div class="col-auto">
      <button class="btn btn-outline-primary" type="submit">Search</button>
      <a class="btn btn-outline-secondary" th:href="@{/org-unit/list}">Reset</a>
    </div>
  </form>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
          <tr>
            <th style="width: 90px;">#</th>
            <th>Unit Id</th>
            <th>Name</th>
            <th>Description</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(items)}">
            <td colspan="4" class="text-center text-muted py-4">No data</td>
          </tr>

          <tr th:each="it, stat : ${items}">
            <td th:text="${stat.count}">1</td>
            <td th:text="${it.unitId} ?: '-'">OU-001</td>
            <td class="fw-semibold" th:text="${it.name}">Sales</td>
            <td th:text="${it.description} ?: '-'">Desc</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</content>

</body>
</html>
